name: test

on:
  push:
    branches:
      - main
  pull_request:

permissions:
  contents: read

jobs:
  test:
    runs-on: windows-latest
    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Setup Node.js
        uses: actions/setup-node@v4
        with:
          node-version: 24

      - name: Syntax check
        shell: pwsh
        run: |
          node --check .\server.mjs
          node --check .\selftest.mjs
          node --check .\calltest.mjs
          node --check .\orchestration-test.mjs
          node --check .\state-advance-policy-test.mjs
          node --check .\bridge-sync-test.mjs
          node --check .\bridge-sync-lock-test.mjs
          node --check .\legal-action-fallback-test.mjs
          node --check .\ui-fallback-test.mjs
          node --check .\scene-fallback-test.mjs
          node --check .\battle-play-card-fallback-test.mjs
          node --check .\no-mouse-guidance-test.mjs
          node --check .\event-route-trace-test.mjs
          node --check .\assertion-tools-test.mjs
          node --check .\state-proof-ui-filter-test.mjs
          node --check .\compact-story-tools-test.mjs
          node --check .\map-placement-control-test.mjs
          node --check .\verify-end-to-end-fake.mjs
          python -m py_compile .\mcp-call.py .\config-launch-test.py
          powershell -NoProfile -ExecutionPolicy Bypass -File .\verify-script-syntax.ps1

      - name: Run tests
        run: npm test
